body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(180deg, #9fe7ff, #ffffff);
  text-align: center;
  overflow-x: hidden;
}

/* BOLHAS SUBINDO */
.bolha {
  position: fixed;
  bottom: -50px;
  width: 20px;
  height: 20px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  animation: subir 10s infinite ease-in;
}

@keyframes subir {
  0% { transform: translateY(0); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-1000px); opacity: 0; }
}

h1 {
  color: #7b5cff;
  font-size: 28px;
  margin-top: 20px;
}

.container {
  padding: 20px;
}

/* FOTO LUXO */
.foto {
  margin: 20px auto;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  overflow: hidden;
  border: 6px solid #e6dcff;
  box-shadow: 0 0 25px rgba(123,92,255,0.6);
}

.foto img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 20px;
  margin: 20px auto;
  max-width: 400px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}
