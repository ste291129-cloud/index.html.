<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aniversário da Helena</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: #fff;
  overflow-x: hidden;

  background:
  linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
  url("data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...(base64 reduzido)");
  background-size: cover;
}

/* TITULO */
h1 {
  margin-top: 20px;
  color: #ffb3ff;
  text-shadow: 0 0 15px #ffb3ff, 0 0 25px #00eaff;
}

/* IMAGENS */
.topo {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.topo img {
  width: 100px;
  border-radius: 15px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.9);
  color: #333;
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}

/* BOTÕES */
a {
  padding: 10px;
  border-radius: 20px;
  text-decoration: none;
  display: inline-block;
}

.whatsapp {background:#25D366;color:white;}
.mapa {background:#00c3ff;color:white;}

/* CONTADOR */
#contador {
  font-weight: bold;
  color: #0077ff;
}

/* BOLHAS */
.bolha {
  position:absolute;
  width:8px;height:8px;
  background:white;
  border-radius:50%;
  opacity:0.6;
  animation: subir linear infinite;
}

@keyframes subir {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<h1>🧜‍♀️ Aniversário da Helena 🌊</h1>

<div class="topo">
  <img src="data:image/png;base64,iVBORw0KGgoAAA...(Ariel leve)">
  <img src="data:image/jpeg;base64,/9j/4AAQSkZJRg...(Helena leve)">
</div>

<div class="card">
<p><strong>Você está convidado para um dia mágico! 💖</strong></p>
<p>📅 24/05/2026 às 18h</p>
<p>📍 Av. Independência, 294</p>
<p>🎈 Top Festa Buffet</p>
<a href="https://goo.gl/maps/Xk3bHkY7h6S2" class="mapa">Ver localização</a>
</div>

<div class="card">
<p id="contador"></p>
</div>

<div class="card">
<a href="https://wa.me/5516993813071?text=Confirmo presença" class="whatsapp">
Confirmar presença
</a>
</div>

<div class="card">
✨ Venha viver esse momento mágico no fundo do mar! 🐠💖
</div>

<!-- MÚSICA -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/GC_mV1IpjWA?autoplay=1&mute=1&loop=1&playlist=GC_mV1IpjWA"
allow="autoplay">
</iframe>

<script>
// bolhas
for(let i=0;i<25;i++){
 let b=document.createElement("div");
 b.className="bolha";
 b.style.left=Math.random()*100+"%";
 b.style.animationDuration=(3+Math.random()*5)+"s";
 document.body.appendChild(b);
}

// contador
const dataFesta = new Date("May 24, 2026 18:00:00").getTime();
const contador = document.getElementById("contador");

setInterval(()=>{
  const agora = new Date().getTime();
  const d = dataFesta - agora;

  const dias = Math.floor(d/(1000*60*60*24));
  const horas = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  const minutos = Math.floor((d%(1000*60*60))/(1000*60));
  const segundos = Math.floor((d%(1000*60))/1000);

  contador.innerHTML = d>0 
  ? `⏳ ${dias}d ${horas}h ${minutos}m ${segundos}s`
  : "🎉 A festa começou!";
},1000);
</script>

</body>
</html>
