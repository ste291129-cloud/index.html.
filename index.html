<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aniversário da Helena</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow-x: hidden;
  height: 100vh;
  background: #3db6f5;
  color: #fff;
  position: relative;
}

/* FUNDO SUBAQUÁTICO */
.fundo-mar {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: url('https://i.imgur.com/oe4iK5R.jpg') no-repeat center center;
  background-size: cover;
  z-index: -1;
}

/* PEIXES */
.peixe {
  position: absolute;
  width: 60px;
  height: auto;
  animation: nadar linear infinite;
}
@keyframes nadar {
  0% {transform: translateX(-100px);}
  100% {transform: translateX(110vw);}
}

/* BOLHAS */
.bolha {
  position: absolute;
  bottom:-40px;
  width:15px; height:15px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  animation: subir 12s infinite linear;
}
@keyframes subir {
  0% { transform: translateY(0); opacity: 0;}
  50% { opacity: 1;}
  100% { transform: translateY(-800px); opacity: 0;}
}

/* TITULO */
h1 {
  color:#ffb3ff;
  font-size:36px;
  margin-top:20px;
  text-shadow: 0 0 15px #ffb3ff, 0 0 30px #7b5cff;
}

/* CARDS */
.container {padding:20px;}
.card {
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 20px;
  margin: 15px auto;
  max-width: 400px;
  color: #333;
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

/* CONTADOR */
#contador {font-size:22px; color:#7b5cff; font-weight:bold; margin:10px 0;}

/* BOTÕES */
a {
  display:inline-block;
  padding:10px 18px;
  border-radius:25px;
  text-decoration:none;
  font-weight:bold;
  margin:10px 5px;
  font-size:14px;
}
a.whatsapp {background:#25D366;color:white;}
a.whatsapp:hover{background:#1ebe5d;}
a.mapa {background:#ff6ffb;color:white;}
a.mapa:hover{background:#d45edb;}
</style>
</head>
<body>

<div class="fundo-mar"></div>

<!-- PEIXES -->
<img class="peixe" src="https://i.imgur.com/jm0oCPL.png" style="top:20%; animation-duration:25s;">
<img class="peixe" src="https://i.imgur.com/jm0oCPL.png" style="top:50%; animation-duration:35s; animation-delay:5s;">

<h1>Aniversário da Helena 🎉</h1>

<div class="container">
  <div class="card">
    <p>Data: 24/05/2026</p>
    <p>Local: Avenida Independência, 294 - Jardim Sumaré, Ribeirão Preto</p>
    <p>Buffet: Top Festa Buffet</p>
    <a href="https://goo.gl/maps/Xk3bHkY7h6S2" target="_blank" class="mapa">Ver localização</a>
  </div>

  <div class="card">
    <p id="contador">Contagem regressiva:</p>
  </div>

  <div class="card">
    <a href="https://wa.me/5516993813071?text=Oi,%20confirmo%20minha%20presença%20na%20festa%20da%20Helena!" target="_blank" class="whatsapp">Confirmar presença</a>
  </div>
</div>

<!-- BOLHAS -->
<div class="bolha" style="left:10%;"></div>
<div class="bolha" style="left:30%; width:18px;"></div>
<div class="bolha" style="left:50%; width:16px;"></div>
<div class="bolha" style="left:70%; width:20px;"></div>
<div class="bolha" style="left:85%; width:15px;"></div>

<!-- MÚSICA -->
<div style="display:none;">
<iframe width="0" height="0" src="https://www.youtube.com/embed/jcqf0bWv4HI?autoplay=1&loop=1&playlist=jcqf0bWv4HI" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<script>
// CONTADOR
const dataFesta = new Date("May 24, 2026 18:00:00").getTime();
const contador = document.getElementById("contador");
setInterval(()=>{
  const agora = new Date().getTime();
  const distancia = dataFesta - agora;
  const dias = Math.floor(distancia/(1000*60*60*24));
  const horas = Math.floor((distancia%(1000*60*60*24))/(1000*60*60));
  const minutos = Math.floor((distancia%(1000*60*60))/(1000*60));
  const segundos = Math.floor((distancia%(1000*60))/1000);
  contador.innerHTML = distancia>0?`Faltam ${dias}d ${horas}h ${minutos}m ${segundos}s`:"A festa começou! 🎉";
},1000);
</script>

</body>
</html>
